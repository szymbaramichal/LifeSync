<div class="create-profile-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Create profile</mat-card-title>
      <mat-card-subtitle>Fill in your details to continue.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Display name</mat-label>
          <input
            matInput
            formControlName="displayName"
            placeholder="Insert your display name!"
          />
        </mat-form-field>

        <div class="actions">
          <button
            mat-flat-button
            color="primary"
            type="submit"
            [disabled]="profileForm.invalid || isLoading()">
            @if (isLoading()) {
              Saving...
            } @else {
              Create profile
            }
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
