<app-group-selector (expenseGroupChanged)="onGroupChange($event)"></app-group-selector>
@if(isGroupCreateMode()) {
  <app-create-group></app-create-group>
}
@else if (isGroupJoinMode()) {
  <app-join-group></app-join-group>
}
@else {
  <mat-tab-group mat-stretch-tabs="false" mat-align-tabs="start" (selectedTabChange)="onTabChange($event)">
    <mat-tab label="Expenses"><app-expenses-list [groupId]="selectedGroupId()" [refreshVersion]="expensesRefreshVersion()"></app-expenses-list></mat-tab>
    <mat-tab label="Add new expense"><app-expenses-upsert [expenseGroupId]="selectedGroupId()"></app-expenses-upsert></mat-tab>
    <mat-tab label="Settings"><app-group-settings [groupId]="selectedGroupId()"></app-group-settings></mat-tab>
  </mat-tab-group>
}
